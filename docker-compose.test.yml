services:
  # ====================
  # MongoDB - 使用国内镜像
  # ====================
  mongodb:
    image: mongo:7
    container_name: douyin-claw-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    networks:
      - douyin-claw-network

  # ====================
  # Redis
  # ====================
  redis:
    image: redis:7-alpine
    container_name: douyin-claw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - douyin-claw-network

networks:
  douyin-claw-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
